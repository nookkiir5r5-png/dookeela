name: อัปเดตเพลย์ลิสต์อัตโนมัติ

on:
  schedule:
    - cron: "0 */6 * * *"
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: ติดตั้ง Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      
      # *** เพิ่มตรงส่วนนี้เพื่อแก้ปัญหา ModuleNotFoundError ***
      - name: ติดตั้งไลบรารีที่จำเป็น
        run: pip install requests
      
      - name: รันสคริปต์อัปเดต
        run: python update_playlist.py
      - name: ทำการ Commit และ Push ข้อมูล
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "action@github.com"
          git add playlist.m3u playlist.json
          git commit -m "Auto-update playlist" || exit 0
          git push
