name: Auto Update Playlist

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 */6 * * *' # อัปเดตทุก 6 ชั่วโมง (เอา # ออกถ้าต้องการตั้งเวลา)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run script
        run: python update_playlist.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add playlist.json playlist.m3u
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto update playlist" && git push)
